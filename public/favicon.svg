<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#FFFDF9"/>
  <!-- Outer border — hairline -->
  <rect x="0.5" y="0.5" width="31" height="31" fill="none" stroke="#C2B8AF" stroke-width="0.75"/>
  <!-- Orange left accent -->
  <rect x="0" y="0" width="3" height="32" fill="#CC4400"/>
  <!-- Letter M — italic serif, centered in remaining space -->
  <text
    x="18"
    y="23"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="400"
    font-style="italic"
    fill="#1A1A1A"
    text-anchor="middle"
  >M</text>
</svg>
