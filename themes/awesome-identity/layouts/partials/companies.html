{{- $logos := .Site.Params.companies.logos -}}
{{- if gt (len $logos) 0 -}}
<section class="companies{{ if ge (len $logos) 2 }} companies--animate{{ end }}" aria-label="Companies">
  <div class="companies__viewport">
    <div class="companies__track">
      <div class="companies__group">
        {{- range $logos -}}
        <div class="companies__logo">
          <img src="{{ .image | relURL }}" alt="{{ .name }}" loading="lazy" decoding="async" />
        </div>
        {{- end -}}
      </div>
      {{- if ge (len $logos) 2 -}}
      <div class="companies__group" aria-hidden="true">
        {{- range $logos -}}
        <div class="companies__logo">
          <img src="{{ .image | relURL }}" alt="" loading="lazy" decoding="async" />
        </div>
        {{- end -}}
      </div>
      {{- end -}}
    </div>
  </div>
</section>
{{- end -}}
