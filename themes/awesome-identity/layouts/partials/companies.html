{{- $logos := .Site.Params.companies.logos -}}
{{- if gt (len $logos) 0 -}}
<div class="companies-ticker">
  <div class="companies-ticker__viewport">
    <div class="companies-ticker__track">
      <div class="companies-ticker__group">
        {{- range $logos -}}
        <div class="companies-ticker__logo">
          <img src="{{ .image | relURL }}" alt="{{ .name }}" loading="lazy" decoding="async" />
        </div>
        {{- end -}}
      </div>
      <div class="companies-ticker__group" aria-hidden="true">
        {{- range $logos -}}
        <div class="companies-ticker__logo">
          <img src="{{ .image | relURL }}" alt="" loading="lazy" decoding="async" />
        </div>
        {{- end -}}
      </div>
      <div class="companies-ticker__group" aria-hidden="true">
        {{- range $logos -}}
        <div class="companies-ticker__logo">
          <img src="{{ .image | relURL }}" alt="" loading="lazy" decoding="async" />
        </div>
        {{- end -}}
      </div>
      <div class="companies-ticker__group" aria-hidden="true">
        {{- range $logos -}}
        <div class="companies-ticker__logo">
          <img src="{{ .image | relURL }}" alt="" loading="lazy" decoding="async" />
        </div>
        {{- end -}}
      </div>
    </div>
  </div>
</div>
{{- end -}}
